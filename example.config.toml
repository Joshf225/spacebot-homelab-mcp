# Example configuration for spacebot-homelab-mcp
# Place this at ~/.spacebot-homelab/config.toml

# Docker hosts
[docker.hosts.local]
host = "unix:///var/run/docker.sock"

# WARNING: Port 2375 is unencrypted Docker API. Only use on trusted networks.
# For remote hosts, prefer TLS on port 2376 — see the [docker.hosts.secure-remote]
# example at the bottom of this file.
[docker.hosts.vps]
host = "tcp://vps.example.com:2375"

# Proxmox VE hosts
[proxmox.hosts.pve1]
url = "https://192.168.1.10:8006"
token_id = "root@pam!spacebot"
token_secret = "${PVE_TOKEN_SECRET}"  # Use env var for the API token secret
node = "pve1"                          # Optional: node name (auto-detected if omitted)
verify_tls = false                     # Accept self-signed certs (default: true)
task_wait_timeout_secs = 600           # Optional: local wait budget before returning the task UPID

# Multi-node cluster example
# [proxmox.hosts.pve2]
# url = "https://192.168.1.11:8006"
# token_id = "automation@pve!spacebot"
# token_secret = "${PVE2_TOKEN_SECRET}"
# node = "pve2"

# SSH hosts
[ssh.hosts.home]
host = "192.168.1.1"
port = 22
user = "homelab-agent"
private_key_path = "~/.ssh/homelab-home"

[ssh.hosts.nas]
host = "192.168.1.50"
port = 22
user = "homelab-agent"
private_key_path = "~/.ssh/homelab-nas"

[ssh.hosts.proxmox]
host = "192.168.1.10"
port = 22
user = "homelab-agent"  # NOT root!
private_key_path = "~/.ssh/homelab-proxmox"

# SSH connection pool configuration
[ssh.pool]
max_sessions_per_host = 3
max_channels_per_session = 10   # Max multiplexed channels per SSH session
max_lifetime_secs = 1800        # 30 minutes
max_idle_time_secs = 300        # 5 minutes
connect_timeout_secs = 10
checkout_timeout_secs = 5
keepalive_interval_secs = 60    # SSH keepalive probe interval

# SSH command validation
[ssh.command_allowlist]
allowed_prefixes = [
    "docker",
    "zpool",
    "zfs",
    "df",
    "free",
    "uptime",
    "systemctl status",
    "systemctl is-active",
    "systemctl list-units",
    "journalctl",
    "sudo systemctl status",
    "sudo systemctl restart",
    "sudo zpool",
    "sudo zfs",
]

blocked_patterns = [
    "rm -rf",
    "dd if=",
    "mkfs",
    "fdisk",
    "parted",
    "> /dev/",
    "| bash",
    "| sh",
    "; ",
    "&& ",
    "$(",
    "`",
]

# Audit logging configuration
[audit]
# File path should be outside the Spacebot agent data directory
file = "/var/log/spacebot-homelab/audit.log"

# Alternative: syslog
# [audit.syslog]
# facility = "local0"
# tag = "spacebot-homelab"

# Rate limiting (optional)
# Mode: "global" (default) — all callers share one rate limit window
#        "per_caller" — each caller gets their own rate limit window
# [rate_limits]
# mode = "per_caller"

[rate_limits.limits]
"docker.container.*" = { per_minute = 5 }
"ssh.exec" = { per_minute = 10 }
"docker.container.delete" = { per_minute = 1 }
"docker.image.*" = { per_minute = 5 }
"docker.image.delete" = { per_minute = 1 }
"docker.image.prune" = { per_minute = 1 }
"proxmox.*" = { per_minute = 15 }

# Tools configuration (optional)
# If the [tools] section is omitted entirely, all tools are enabled.
# If present, only listed tools are registered with MCP (Layer 2 security).
# Note: confirm_operation is always available regardless of this setting.
# [tools]
# enabled = [
#     "docker.container.list",
#     "docker.container.start",
#     "docker.container.stop",
#     "docker.container.logs",
#     "docker.container.inspect",
#     "docker.container.delete",   # Destructive — requires confirmation
#     "docker.container.create",
#     "docker.image.list",
#     "docker.image.pull",
#     "docker.image.inspect",
#     "docker.image.delete",      # Destructive — requires confirmation
#     "docker.image.prune",       # Destructive — requires confirmation
#     "proxmox.node.list",
#     "proxmox.node.status",
#     "proxmox.vm.list",
#     "proxmox.vm.status",
#     "proxmox.vm.start",
#     "proxmox.vm.stop",              # Destructive — requires confirmation
#     "proxmox.vm.create",            # Destructive — requires confirmation
#     "proxmox.vm.clone",
#     "proxmox.vm.delete",            # Destructive — requires confirmation
#     "proxmox.vm.snapshot.list",
#     "proxmox.vm.snapshot.create",
#     "proxmox.vm.snapshot.rollback", # Destructive — requires confirmation
#     "proxmox.storage.list",
#     "proxmox.network.list",
#     "ssh.exec",
#     "ssh.upload",
#     "ssh.download",
# ]

# Confirmation rules for destructive operations (Layer 8 security)
# NOTE: Enable this only if your MCP client can complete the two-step
# `confirm_operation` flow. If your Spacebot build/UI does not yet surface
# pending confirmations, leave this section commented out and use `dry_run`
# for destructive commands until confirmation UX support is available.
# [confirm]
# "ssh.exec" = { when_pattern = ["systemctl restart"] }
# "docker.container.stop" = "always"
# "docker.container.delete" = "always"
# "docker.image.delete" = "always"
# "docker.image.prune" = "always"
# "proxmox.vm.stop" = "always"
# "proxmox.vm.create" = "always"
# "proxmox.vm.delete" = "always"
# "proxmox.vm.snapshot.rollback" = "always"

# Docker host with TLS (optional)
# [docker.hosts.secure-remote]
# host = "tcp://secure.example.com:2376"
# cert_path = "~/.docker/cert.pem"
# key_path = "~/.docker/key.pem"
# ca_path = "~/.docker/ca.pem"

# Metrics (optional, requires "metrics" feature)
# [metrics]
# enabled = true
# listen = "127.0.0.1:9090"  # Prometheus scrape endpoint

# SSH passphrase from environment variable (optional)
# Supports $VAR_NAME and ${VAR_NAME} syntax
# [ssh.hosts.encrypted-key]
# host = "10.0.0.1"
# user = "homelab-agent"
# private_key_path = "~/.ssh/homelab-encrypted"
# private_key_passphrase = "${SSH_KEY_PASSPHRASE}"
