name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: spacebot-homelab-mcp

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # For cross-compiling aarch64-linux on x86_64 runner
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - if: runner.os == 'Windows'
        uses: ./.github/actions/install-openssl

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        id: package-unix
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_NAME="${BINARY_NAME}-${VERSION}-${{ matrix.target }}.${{ matrix.archive }}"

          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" staging/
          cp README.md LICENSE* example.config.toml staging/ 2>/dev/null || true

          cd staging
          tar czf "../${ARCHIVE_NAME}" .
          cd ..

          echo "archive=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        id: package-windows
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}".TrimStart("v")
          $ArchiveName = "${{ env.BINARY_NAME }}-${Version}-${{ matrix.target }}.${{ matrix.archive }}"
          New-Item -ItemType Directory -Force staging
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" staging/
          Copy-Item README.md, example.config.toml staging/ -ErrorAction SilentlyContinue
          Compress-Archive -Path staging/* -DestinationPath $ArchiveName
          echo "archive=${ArchiveName}" >> $env:GITHUB_OUTPUT
          echo "version=${Version}" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package-unix.outputs.archive || steps.package-windows.outputs.archive }}
          path: ${{ steps.package-unix.outputs.archive || steps.package-windows.outputs.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum -- ./*.tar.gz ./*.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.zip
            release/checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
